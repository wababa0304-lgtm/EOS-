<!DOCTYPE html>
<html lang="ko">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>EOS 계약계산기(렌탈)</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<div class="container">


<h1>EOS 계약계산기(렌탈)</h1>



<div class="card">


<label>업체명</label>

<input id="company" type="text" placeholder="업체명">


<label>대표자</label>

<input id="owner" type="text" placeholder="대표자">


<label>담당자</label>

<input id="manager" type="text" placeholder="담당자">


</div>




<div class="card">


<h2>제품 추가</h2>


<label>제품 선택</label>

<select id="productSelect"></select>



<label>수량</label>

<input
id="qty"
type="number"
value="1"
min="1">





<h3>가격 조정</h3>


<label>
월 사용료 조정
</label>

<input
id="customPrice"
type="number"
placeholder="기본값 사용">


<p>
기본 월 사용료 :
<span id="originPrice">0원</span>
</p>





<h3>업셀</h3>


<label>
업셀 금액
</label>


<input
id="upsell"
type="number"
value="0"
placeholder="추가 금액">




<h3>할인</h3>


<label>
할인 금액
</label>


<input
id="discount"
type="number"
value="0"
placeholder="할인 금액">





<button id="addBtn">

추가하기

</button>


</div>





<div class="card">


<h2>계약 목록</h2>


<table>


<thead>

<tr>

<th>제품</th>

<th>수량</th>

<th>판매금액</th>

<th>월납입</th>

<th>지원금</th>

<th>삭제</th>


</tr>


</thead>


<tbody id="contractList">


</tbody>


</table>


</div>







<div class="card">


<h2>계산 결과</h2>


<h3>총 판매금액</h3>

<p id="totalPrice">
0원
</p>



<h3>총 월 납입금</h3>

<p id="monthlyPayment">
0원
</p>



<h3>총 지원금</h3>

<p id="supportMoney">
0원
</p>



</div>






<div class="buttons">


<button id="saveBtn">
저장
</button>


<button id="pdfBtn">
PDF 출력
</button>


<button id="resetBtn">
초기화
</button>


</div>






<!-- 저장된 계약 목록 -->

<div class="card">


<h2>저장된 계약</h2>


<table>


<thead>

<tr>

<th>업체명</th>

<th>날짜</th>

<th>금액</th>

<th>월납입</th>

<th>관리</th>


</tr>


</thead>


<tbody id="savedList">


</tbody>


</table>


</div>





</div>





<script src="products.js"></script>

<script src="script.js"></script>


</body>

</html>
